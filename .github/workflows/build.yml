name: Build BreakTick

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore BreakTick.sln --configfile NuGet.Config
      - name: Build
        run: dotnet build BreakTick.sln -c Release --no-restore
      - name: Publish self-contained package
        run: >
          dotnet publish src/BreakTick.App/BreakTick.App.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true --no-restore
          -o artifacts/BreakTick-win-x64
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: BreakTick-win-x64
          path: artifacts/BreakTick-win-x64
